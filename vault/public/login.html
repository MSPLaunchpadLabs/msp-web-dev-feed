<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Web Dev Intelligence Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .wrapper { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: #00d4c8; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 14px;
      color: #000; letter-spacing: 0.5px;
    }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name { font-size: 15px; font-weight: 600; color: #f0f0f0; }
    .brand-sub { font-size: 12px; color: #888; }
    .card {
      background: #161616; border: 1px solid #2a2a2a;
      border-radius: 14px; padding: 36px 40px; width: 380px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .card-title { font-size: 22px; font-weight: 600; color: #f0f0f0; }
    .card-subtitle { font-size: 14px; color: #888; margin-top: 6px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #fff; color: #1a1a1a; border: none; border-radius: 8px;
      padding: 13px 20px; font-size: 15px; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: background 0.15s;
    }
    .btn-google:hover { background: #f0f0f0; }
    .hint { font-size: 12px; color: #555; text-align: center; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <div class="brand-icon">WD</div>
      <div class="brand-text">
        <span class="brand-name">Web Dev Intelligence Feed</span>
        <span class="brand-sub">MSP Launchpad</span>
      </div>
    </div>
    <div class="card">
      <div>
        <div class="card-title">Sign in</div>
        <div class="card-subtitle">MSP Launchpad team accounts only</div>
      </div>
      <a href="/api/auth/google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </a>
      <p class="hint">Sign in with your @msplaunchpad.com Google account</p>
    </div>
  </div>
  <script>sessionStorage.removeItem('auth');</script>
</body>
</html>
